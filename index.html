<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bosque del Niño con Palo - Versión 7.0 (PixiJS WebGL)</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; }
  #ui {
    position:absolute; top:10px; left:10px; color:#fff; background:rgba(0,0,0,0.7);
    padding:12px 16px; border-radius:8px; pointer-events:none; user-select:none;
    font-size:14px; z-index:10; line-height:1.4;
  }
</style>
</head>
<body>

<div id="ui">
  WASD o flechas • Versión 7.0 con PixiJS (WebGL)<br>
  - Texturas y profundidad SNES+<br>
  - Depth sorting perfecto<br>
  - Puente sobre el río (cruzable)<br>
  - Animales mejorados
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
// ================================================
// JUEGO: Versión 7.0 - PixiJS (WebGL, procedural)
// ================================================

const app = new PIXI.Application({
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: 0x0a140a,
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true
});
document.body.appendChild(app.view);

window.addEventListener('resize', () => {
  app.renderer.resize(window.innerWidth, window.innerHeight);
});

// Jugador
const player = {
  x: -420,
  y: -80,
  size: 16,
  speed: 3.2,
  stickLength: 24,
  angle: 0
};

// Controles
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// ================================================
// Objetos (casas, árboles, puente)
// ================================================
const objects = [];

// Casas variadas alrededor de plaza
const houseData = [
  {x:-620, y:-380, w:72, h:92}, {x:-220, y:-420, w:68, h:88},
  {x:-520, y:-180, w:52, h:74}, {x:-280, y:-220, w:56, h:78},
  {x:-120, y:-140, w:48, h:70}, {x:80, y:-260, w:60, h:82},
  {x:-680, y:40, w:42, h:62}, {x:-340, y:120, w:38, h:58},
  {x:120, y:80, w:46, h:66}, {x:320, y:-40, w:44, h:64}
];
houseData.forEach(h => objects.push({type:'house', x:h.x, y:h.y, baseY:h.y + 20}));

// Árboles (más densos)
for (let i = 0; i < 90; i++) {
  const a = Math.random() * Math.PI * 2;
  const d = 150 + Math.random() * 800;
  objects.push({
    type: 'tree',
    x: -1400 + Math.cos(a) * d,
    y: -1350 + Math.sin(a) * d * 0.7,
    baseY: 0 // se calcula después
  });
}

// Puente (nuevo)
objects.push({
  type: 'bridge',
  x: 800,
  y: 680,
  baseY: 680 + 30,
  width: 120,
  length: 80
});

// Contenedor principal para depth sorting
const world = new PIXI.Container();
app.stage.addChild(world);

// Cámara rolling
const camera = { x: 0, y: 0 };

// ================================================
// Update
// ================================================
function update(delta) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  if (dx || dy) {
    const len = Math.hypot(dx, dy) || 1;
    dx /= len; dy /= len;
    player.angle = Math.atan2(dy, dx);
  }

  player.x += dx * player.speed * delta;
  player.y += dy * player.speed * delta;

  // Cámara sigue al jugador
  camera.x = player.x - app.screen.width / 2;
  camera.y = player.y - app.screen.height / 2;
  world.position.set(-camera.x, -camera.y);
}

// ================================================
// Render loop
// ================================================
app.ticker.add((delta) => {
  update(delta);

  // Limpiar y reordenar por Y (depth)
  world.removeChildren();

  // Dibujar terreno procedural (simple grid con ruido)
  const tileSize = 32;
  const startX = Math.floor(camera.x / tileSize) - 2;
  const endX = Math.floor((camera.x + app.screen.width) / tileSize) + 2;
  const startY = Math.floor(camera.y / tileSize) - 2;
  const endY = Math.floor((camera.y + app.screen.height) / tileSize) + 2;

  for (let tx = startX; tx <= endX; tx++) {
    for (let ty = startY; ty <= endY; ty++) {
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      const n = Math.sin(wx * 0.01) * Math.cos(wy * 0.01) * 0.5 + 0.5;
      const grass = new PIXI.Graphics();
      grass.beginFill(0x55aa55 + (n * 0x228822));
      grass.drawRect(wx, wy, tileSize, tileSize);
      grass.endFill();
      world.addChild(grass);
    }
  }

  // Ordenar objetos por baseY
  const sorted = [...objects].sort((a, b) => a.baseY - b.baseY);

  // Dibujar objetos
  sorted.forEach(obj => {
    const gfx = new PIXI.Graphics();
    const sx = obj.x;
    const sy = obj.y;

    if (obj.type === 'house') {
      gfx.beginFill(0x8b4513);
      gfx.drawRect(sx - 30, sy - 10, 60, 40);
      gfx.endFill();
      gfx.beginFill(0xa0522d);
      gfx.moveTo(sx - 35, sy - 10);
      gfx.lineTo(sx, sy - 60);
      gfx.lineTo(sx + 35, sy - 10);
      gfx.endFill();
    } else if (obj.type === 'tree') {
      gfx.beginFill(0x5a3f2a);
      gfx.drawRect(sx - 10, sy - 5, 20, 40);
      gfx.endFill();
      gfx.beginFill(0x2a4a2a);
      gfx.drawCircle(sx, sy - 30, 25);
      gfx.endFill();
    } else if (obj.type === 'bridge') {
      gfx.beginFill(0x8b6f47);
      gfx.drawRect(sx - 60, sy - 20, 120, 40);
      gfx.endFill();
    }

    world.addChild(gfx);
  });

  // Jugador (siempre encima)
  const playerGfx = new PIXI.Graphics();
  playerGfx.beginFill(0xffddaa);
  playerGfx.drawCircle(player.x, player.y, player.size);
  playerGfx.endFill();
  world.addChild(playerGfx);
});

// Iniciar
spawnAnimal(); // inicial
app.start();
</script>
</body>
</html>
