<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gabriel's RPG - Terreno y Agua</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; }
        #ui { position: absolute; top: 20px; left: 20px; color: #2c3e50; font-family: 'Arial', sans-serif; pointer-events: none; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 10px; border: 3px solid #000; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Mundo de Gabriel: Fase 2</b><br>
        - Terreno con relieve (Lomas)<br>
        - Agua animada (Río)<br>
        - Personaje con Outlines (Cel-shaded)
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

<script type="module">
import * as THREE from 'three';

// --- CONFIGURACIÓN DE SHADERS ---
const rollingVS = `
    uniform float uCurvature;
    uniform float uTime;
    varying vec2 vUv;
    varying vec3 vNormal;
    varying float vHeight;

    void main() {
        vUv = uv;
        vNormal = normal;
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        
        // Almacenamos la altura para colorear según elevación
        vHeight = worldPosition.y;

        // EFECTO ROLLING LOG
        float distZ = worldPosition.z - cameraPosition.z;
        worldPosition.y -= pow(distZ, 2.0) * uCurvature;
        
        gl_Position = projectionMatrix * viewMatrix * worldPosition;
    }
`;

const terrainFS = `
    varying float vHeight;
    varying vec3 vNormal;
    void main() {
        // Coloreado por altura (Pasto vs Tierra)
        vec3 color = vHeight > 1.5 ? vec3(0.4, 0.8, 0.2) : vec3(0.3, 0.7, 0.2);
        if(vHeight < 0.2) color = vec3(0.7, 0.6, 0.4); // Arena/Tierra cerca del agua

        float intensity = dot(vNormal, vec3(0.0, 1.0, 0.5));
        float shade = intensity > 0.5 ? 1.0 : 0.7;
        gl_FragColor = vec4(color * shade, 1.0);
    }
`;

const waterFS = `
    uniform float uTime;
    varying vec2 vUv;
    void main() {
        // Ondas animadas estilo Wind Waker
        float noise = sin(vUv.x * 20.0 + uTime) * cos(vUv.y * 20.0 + uTime);
        vec3 blue = vec3(0.0, 0.5, 0.8);
        if(noise > 0.8) blue = vec3(1.0); // Espuma blanca
        gl_FragColor = vec4(blue, 0.7);
    }
`;

// --- ESCENA ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 35, 45);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const clock = new THREE.Clock();

// --- TERRENO CON RELIEVE ---
const terrainGeo = new THREE.PlaneGeometry(200, 400, 100, 100);
terrainGeo.rotateX(-Math.PI / 2);

// Modificar vértices para crear lomas y el cauce del río
const vertices = terrainGeo.attributes.position.array;
for(let i = 0; i < vertices.length; i += 3) {
    let x = vertices[i];
    let z = vertices[i+2];
    
    // Crear una hondonada central para el río
    if (Math.abs(x) < 15) {
        vertices[i+1] = -2; // El río está hundido
    } else {
        // Lomas suaves usando ruido matemático
        vertices[i+1] = Math.sin(x * 0.1) * Math.cos(z * 0.1) * 3;
    }
}
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.ShaderMaterial({
    uniforms: { uCurvature: { value: 0.0007 } },
    vertexShader: rollingVS,
    fragmentShader: terrainFS
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
scene.add(terrain);

// --- AGUA (RÍO) ---
const waterGeo = new THREE.PlaneGeometry(30, 400, 10, 10);
waterGeo.rotateX(-Math.PI / 2);
const waterMat = new THREE.ShaderMaterial({
    uniforms: { 
        uCurvature: { value: 0.0007 },
        uTime: { value: 0 }
    },
    vertexShader: rollingVS,
    fragmentShader: waterFS,
    transparent: true
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.position.y = -1.5; // Un poco abajo del nivel del suelo
scene.add(water);

// --- PERSONAJE CON OUTLINE ---
function createCharacter() {
    const group = new THREE.Group();
    const mat = new THREE.ShaderMaterial({
        uniforms: { uCurvature: { value: 0.0007 }, uColor: { value: new THREE.Color(0xffd700) } },
        vertexShader: rollingVS,
        fragmentShader: `varying vec3 vNormal; uniform vec3 uColor; void main() { 
            float intensity = dot(vNormal, vec3(0,1,0.5));
            gl_FragColor = vec4(uColor * (intensity > 0.5 ? 1.0 : 0.6), 1.0); 
        }`
    });

    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.8, 1.2, 4, 8), mat);
    
    // El "Outline" (Inverted Hull)
    const outlineMat = new THREE.ShaderMaterial({
        uniforms: { uCurvature: { value: 0.0007 } },
        vertexShader: rollingVS,
        fragmentShader: `void main() { gl_FragColor = vec4(0,0,0,1); }`,
        side: THREE.BackSide // Renderiza las caras internas
    });
    const outline = new THREE.Mesh(body.geometry, outlineMat);
    outline.scale.multiplyScalar(1.15); // Un poco más grande para que se vea el borde

    group.add(outline);
    group.add(body);
    return group;
}

const player = createCharacter();
player.position.y = 2;
scene.add(player);

// --- LÓGICA ---
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();
    waterMat.uniforms.uTime.value = time;

    const speed = 0.6;
    let nextX = player.position.x;
    let nextZ = player.position.z;

    if (keys['KeyW']) nextZ -= speed;
    if (keys['KeyS']) nextZ += speed;
    if (keys['KeyA']) nextX -= speed;
    if (keys['KeyD']) nextX += speed;

    // Colisión simple con el agua
    if (Math.abs(nextX) > 13) { 
        player.position.x = nextX;
        player.position.z = nextZ;
    }

    // El jugador sube/baja según el relieve (aproximación)
    player.position.y = Math.sin(player.position.x * 0.1) * Math.cos(player.position.z * 0.1) * 3 + 1.5;

    camera.position.x += (player.position.x - camera.position.x) * 0.1;
    camera.position.z += (player.position.z + 45 - camera.position.z) * 0.1;
    camera.lookAt(player.position.x, 0, player.position.z - 10);

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
