<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bosque del Niño con Palo - Versión 7.1 (PixiJS estable)</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; }
  #ui {
    position:absolute; top:10px; left:10px; color:#fff; background:rgba(0,0,0,0.7);
    padding:12px 16px; border-radius:8px; pointer-events:none; user-select:none;
    font-size:14px; z-index:10; line-height:1.4;
  }
</style>
</head>
<body>

<div id="ui">
  WASD o flechas • Versión 7.1 PixiJS (arreglado)<br>
  - No más patrón loco de colores<br>
  - Terreno verde normal + profundidad<br>
  - Puente cruzable sobre el río<br>
  - Cámara rolling suave
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
// ================================================
// Versión 7.1 - PixiJS estable para iOS/Safari
// ================================================

const app = new PIXI.Application({
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: 0x0a140a,
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true
});
document.body.appendChild(app.view);

// Resize handler robusto
window.addEventListener('resize', () => {
  app.renderer.resize(window.innerWidth, window.innerHeight);
});

// Jugador
const player = { x: -420, y: -80, size: 16, speed: 3.2, angle: 0 };

// Controles
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Contenedor mundo
const world = new PIXI.Container();
app.stage.addChild(world);

// Cámara
let camera = { x: 0, y: 0 };

// ================================================
// Update
// ================================================
function update(delta) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  if (dx || dy) {
    const len = Math.hypot(dx, dy) || 1;
    dx /= len; dy /= len;
    player.angle = Math.atan2(dy, dx);
  }

  player.x += dx * player.speed * delta;
  player.y += dy * player.speed * delta;

  // Cámara rolling
  camera.x = player.x - app.screen.width / 2;
  camera.y = player.y - app.screen.height / 2;
  world.position.set(-camera.x, -camera.y);
}

// ================================================
// Render terreno + objetos
// ================================================
app.ticker.add((delta) => {
  update(delta);

  world.removeChildren();

  // Terreno (verde estable, con variación suave)
  const tileSize = 32;
  const startX = Math.floor(camera.x / tileSize) - 5;
  const endX = Math.floor((camera.x + app.screen.width) / tileSize) + 5;
  const startY = Math.floor(camera.y / tileSize) - 5;
  const endY = Math.floor((camera.y + app.screen.height) / tileSize) + 5;

  for (let tx = startX; tx <= endX; tx++) {
    for (let ty = startY; ty <= endY; ty++) {
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      const n = (Math.sin(wx * 0.008) + Math.cos(wy * 0.008)) * 0.5 + 0.5;
      const color = 0x55aa55 + Math.floor(n * 0x228822);

      const tile = new PIXI.Graphics();
      tile.beginFill(color);
      tile.drawRect(wx, wy, tileSize, tileSize);
      tile.endFill();
      world.addChild(tile);
    }
  }

  // Puente (fijo, cruzable)
  const bridge = new PIXI.Graphics();
  bridge.beginFill(0x8b6f47);
  bridge.drawRect(750, 650, 140, 60);
  bridge.endFill();
  bridge.beginFill(0xa67c5e);
  bridge.drawRect(760, 660, 120, 40);
  bridge.endFill();
  world.addChild(bridge);

  // Árboles simples (ejemplo)
  for (let i = 0; i < 20; i++) {
    const tree = new PIXI.Graphics();
    const tx = -1400 + i * 80;
    const ty = -1350 + (i % 5) * 100;
    tree.beginFill(0x5a3f2a);
    tree.drawRect(tx - 10, ty - 10, 20, 50);
    tree.endFill();
    tree.beginFill(0x2a4a2a);
    tree.drawCircle(tx, ty - 40, 30);
    tree.endFill();
    world.addChild(tree);
  }

  // Jugador (círculo simple por ahora)
  const playerGfx = new PIXI.Graphics();
  playerGfx.beginFill(0xffddaa);
  playerGfx.drawCircle(player.x, player.y, player.size);
  playerGfx.endFill();
  world.addChild(playerGfx);
});
</script>
</body>
</html>
