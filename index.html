<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gabriel's RPG - Real Rolling Log</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #4ca1af; } /* Color del cielo */
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; font-family: 'Arial', sans-serif; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Efecto Rolling Log (Curvatura Proyectada)</h2>
        <p>Mueve al niño hacia arriba para ver cómo el mundo se curva al horizonte.</p>
    </div>

<script>
// --- SHADER DE CURVATURA (EL TRUCO MÁGICO) ---
// Este shader de Pixi manipula los vértices para curvar el mundo hacia atrás.
const rollingVert = `
    attribute vec2 aVertexPosition;
    attribute vec2 aTextureCoord;
    uniform mat3 projectionMatrix;
    varying vec2 vTextureCoord;

    uniform float uCurvature;
    uniform float uViewY;

    void main(void) {
        vTextureCoord = aTextureCoord;
        vec2 pos = aVertexPosition;
        
        // El truco: Aumentamos el desplazamiento en Y basado en la distancia al centro de la cámara
        // Esto crea la ilusión de que el suelo se cae hacia el horizonte
        float dist = pos.y - uViewY;
        if(dist < 0.0) {
            pos.y += pow(abs(dist) * 0.05, 2.0) * uCurvature;
        }

        gl_Position = vec4((projectionMatrix * vec3(pos, 1.0)).xy, 0.0, 1.0);
    }
`;

const app = new PIXI.Application({
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: 0x3a9d23, 
    antialias: true
});
document.body.appendChild(app.view);

const world = new PIXI.Container();
// Aplicamos un filtro de desplazamiento para el efecto visual
const rollingFilter = new PIXI.Filter(null, null, {
    uCurvature: 1.5,
    uViewY: 0
});
// Nota: En PIXI 7 puro, los filtros de malla son más complejos, 
// usaremos una aproximación de escala/posición matemática para el "Rolling" 
// que sea compatible con GitHub Pages sin errores de compilación de shader pesados.

const gameLayer = new PIXI.Container();
world.addChild(gameLayer);
app.stage.addChild(world);

const worldSize = 4000;
const trees = [];
const keys = {};

// --- DIBUJADO DE HIERBA PROCEDURAL ---
const grassGfx = new PIXI.Graphics();
for(let i=0; i<1000; i++) {
    grassGfx.lineStyle(2, 0x2e7d32, 0.5);
    let gx = Math.random() * worldSize;
    let gy = Math.random() * worldSize;
    grassGfx.moveTo(gx, gy);
    grassGfx.lineTo(gx + (Math.random()-0.5)*5, gy - 5 - Math.random()*5);
}
gameLayer.addChild(grassGfx);

class Player {
    constructor() {
        this.cont = new PIXI.Container();
        this.gfx = new PIXI.Graphics();
        this.cont.addChild(this.gfx);
        this.x = worldSize/2;
        this.y = worldSize/2;
        this.speed = 5;
        this.walkTimer = 0;
        gameLayer.addChild(this.cont);
    }

    update() {
        let nx = this.x, ny = this.y;
        let moving = false;
        if(keys['w'] || keys['ArrowUp']) { ny -= this.speed; moving = true; }
        if(keys['s'] || keys['ArrowDown']) { ny += this.speed; moving = true; }
        if(keys['a'] || keys['ArrowLeft']) { nx -= this.speed; moving = true; }
        if(keys['d'] || keys['ArrowRight']) { nx += this.speed; moving = true; }

        // Colisión sólida
        let hit = false;
        for(let t of trees) {
            const dx = nx - t.x;
            const dy = ny - t.y;
            if(Math.sqrt(dx*dx + dy*dy) < 25) { hit = true; break; }
        }
        if(!hit) { this.x = nx; this.y = ny; }

        if(moving) this.walkTimer += 0.2;
        this.draw();
        
        this.cont.x = this.x;
        this.cont.y = this.y;
        this.cont.zIndex = this.y;
    }

    draw() {
        const g = this.gfx; g.clear();
        const b = Math.sin(this.walkTimer*2)*2;
        // Cel-shading Niño
        g.lineStyle(3, 0).beginFill(0xffcc00).drawEllipse(0,-10+b, 12, 15).endFill(); // Cuerpo
        g.beginFill(0xffdbac).drawCircle(0,-32+b, 10).endFill(); // Cabeza
        g.lineStyle(4, 0x5d4037).moveTo(10,-10+b).lineTo(20,-20+Math.cos(this.walkTimer)*5); // Palo
    }
}

function createTree(x, y) {
    const t = new PIXI.Graphics();
    t.lineStyle(3, 0).beginFill(0x5d4037).drawRect(-10, -15, 20, 30).endFill(); // Tronco
    t.beginFill(0x2d5a27).drawCircle(0, -40, 30).drawCircle(-20,-30,20).drawCircle(20,-30,20).endFill(); // Copa
    t.x = x; t.y = y; t.zIndex = y;
    gameLayer.addChild(t);
    trees.push(t);
}

for(let i=0; i<150; i++) createTree(Math.random()*worldSize, Math.random()*worldSize);
const player = new Player();
const cam = { x: 0, y: 0 };

app.ticker.add(() => {
    player.update();
    
    cam.x += (player.x - app.screen.width/2 - cam.x) * 0.1;
    cam.y += (player.y - app.screen.height/1.5 - cam.y) * 0.05;

    gameLayer.x = -cam.x;
    gameLayer.y = -cam.y;

    // --- LÓGICA DE CURVATURA "ROLLING LOG" ---
    gameLayer.children.forEach(c => {
        const relY = c.y - cam.y;
        // Simulamos la curvatura del barril:
        // A medida que relY disminuye (se aleja hacia arriba), los objetos se hunden y se achican
        if(relY < 400) { 
            const curve = Math.pow((400 - relY) * 0.05, 2.5);
            c.pivot.y = -curve; // Los empuja "hacia abajo" visualmente
            const s = Math.max(0, 1 - (400 - relY) * 0.002);
            c.scale.set(s);
            c.alpha = s > 0.2 ? 1 : (s * 5); // Desvanecer en el horizonte
        } else {
            c.pivot.y = 0;
            c.scale.set(1);
            c.alpha = 1;
        }
    });

    gameLayer.children.sort((a,b) => a.zIndex - b.zIndex);
});

window.onkeydown = e => keys[e.key] = true;
window.onkeyup = e => keys[e.key] = false;
</script>
</body>
</html>
