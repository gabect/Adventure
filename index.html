<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gabriel's RPG - Animal Crossing World Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #2c3e50; font-family: 'Arial', sans-serif; pointer-events: none; background: rgba(255,255,255,0.7); padding: 15px; border-radius: 10px; border: 3px solid #000; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Gabriel's Adventure</b><br>
        POV: Animal Crossing "Rolling Log" (Switch Clone)<br>
        Usa WASD para caminar.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

<script type="module">
import * as THREE from 'three';

// --- CONFIGURACIÓN DEL SHADER DE CURVATURA ---
// Este es el "Secreto" de Nintendo. Curva el mundo en el eje Y basado en la distancia Z.
const _VS = `
    uniform float uCurvature;
    varying vec2 vUv;
    varying vec3 vNormal;

    void main() {
        vUv = uv;
        vNormal = normal;
        
        // Posición en el espacio del mundo
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        
        // Aplicamos la deformación: cuanto más lejos (Z), más se hunde (Y)
        // La fórmula es y = y - (z^2 * curvatura)
        float distZ = worldPosition.z - cameraPosition.z;
        worldPosition.y -= pow(distZ, 2.0) * uCurvature;
        
        gl_Position = projectionMatrix * viewMatrix * worldPosition;
    }
`;

const _FS = `
    uniform vec3 uColor;
    varying vec3 vNormal;
    void main() {
        // Cel-shading básico por iluminación
        float intensity = dot(vNormal, vec3(0.0, 1.0, 0.5));
        float shade = intensity > 0.5 ? 1.0 : 0.7;
        gl_FragColor = vec4(uColor * shade, 1.0);
    }
`;

// --- INICIALIZACIÓN DE LA ESCENA ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
// Posicionamos la cámara alta y mirando hacia abajo (estilo Tilt)
camera.position.set(0, 30, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- MATERIAL CON CURVATURA ---
const createRollingMaterial = (color) => {
    return new THREE.ShaderMaterial({
        uniforms: {
            uCurvature: { value: 0.0008 }, // Ajusta esto para más o menos curva
            uColor: { value: new THREE.Color(color) }
        },
        vertexShader: _VS,
        fragmentShader: _FS,
        side: THREE.DoubleSide
    });
};

// --- EL MUNDO ---
// Suelo
const floorGeo = new THREE.PlaneGeometry(1000, 1000, 100, 100);
floorGeo.rotateX(-Math.PI / 2);
const floor = new THREE.Mesh(floorGeo, createRollingMaterial(0x7cfc00));
scene.add(floor);

// Árboles procedurales
const trees = [];
const treeGroup = new THREE.Group();
for(let i = 0; i < 100; i++) {
    const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 4, 8);
    const trunk = new THREE.Mesh(trunkGeo, createRollingMaterial(0x8b4513));
    
    const foliageGeo = new THREE.SphereGeometry(2, 8, 8);
    const foliage = new THREE.Mesh(foliageGeo, createRollingMaterial(0x228b22));
    foliage.position.y = 3;
    
    const tree = new THREE.Group();
    tree.add(trunk);
    tree.add(foliage);
    
    tree.position.set(
        (Math.random() - 0.5) * 200,
        2,
        (Math.random() - 0.5) * 200
    );
    scene.add(tree);
    trees.push(tree);
}

// --- JUGADOR (EL NIÑO) ---
const playerGeo = new THREE.CapsuleGeometry(0.8, 1.5, 4, 8);
const playerMat = createRollingMaterial(0xffd700);
const player = new THREE.Mesh(playerGeo, playerMat);
player.position.y = 1.5;
scene.add(player);

// --- LÓGICA DE MOVIMIENTO ---
const keys = {};
window.addEventListener('keydown', (e) => keys[e.code] = true);
window.addEventListener('keyup', (e) => keys[e.code] = false);

function update() {
    const speed = 0.5;
    if (keys['KeyW']) player.position.z -= speed;
    if (keys['KeyS']) player.position.z += speed;
    if (keys['KeyA']) player.position.x -= speed;
    if (keys['KeyD']) player.position.x += speed;

    // La cámara sigue al jugador con suavizado
    camera.position.x += (player.position.x - camera.position.x) * 0.1;
    camera.position.z += (player.position.z + 40 - camera.position.z) * 0.1;
    camera.lookAt(player.position.x, 0, player.position.z - 10);
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
