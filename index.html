<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gabriel's RPG - Fix Controles y Puente</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #2c3e50; pointer-events: none; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; border: 3px solid #000; box-shadow: 5px 5px 0px rgba(0,0,0,0.2); }
        kbd { background: #eee; border: 1px solid #333; padding: 2px 4px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Gabriel's Adventure</b><br>
        Mover: <kbd>WASD</kbd> o <kbd>Flechas</kbd><br>
        <small>Haz clic en la pantalla si no se mueve.</small>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

<script type="module">
import * as THREE from 'three';

// --- SHADERS (Rolling Log + Cel Shading) ---
const rollingVS = `
    uniform float uCurvature;
    varying vec2 vUv;
    varying vec3 vNormal;
    varying float vWorldY;

    void main() {
        vUv = uv;
        vNormal = normal;
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        vWorldY = worldPosition.y;

        float distZ = worldPosition.z - cameraPosition.z;
        worldPosition.y -= pow(distZ, 2.0) * uCurvature;
        
        gl_Position = projectionMatrix * viewMatrix * worldPosition;
    }
`;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 35, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const clock = new THREE.Clock();

// --- SISTEMA DE CONTROLES CORREGIDO ---
const keys = {};
window.addEventListener('keydown', (e) => { 
    keys[e.key.toLowerCase()] = true; 
    keys[e.code] = true; // Soporte para ArrowUp, ArrowDown, etc.
});
window.addEventListener('keyup', (e) => { 
    keys[e.key.toLowerCase()] = false; 
    keys[e.code] = false; 
});

// --- TERRENO CON RÍO ---
const terrainGeo = new THREE.PlaneGeometry(300, 600, 100, 100);
terrainGeo.rotateX(-Math.PI / 2);

const vertices = terrainGeo.attributes.position.array;
for(let i = 0; i < vertices.length; i += 3) {
    let x = vertices[i];
    let z = vertices[i+2];
    if (Math.abs(x) < 18) {
        vertices[i+1] = -4; // Cauce del río
    } else {
        vertices[i+1] = Math.sin(x * 0.08) * Math.cos(z * 0.08) * 4; // Lomas
    }
}
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.ShaderMaterial({
    uniforms: { uCurvature: { value: 0.0006 } },
    vertexShader: rollingVS,
    fragmentShader: `
        varying float vWorldY;
        varying vec3 vNormal;
        void main() {
            vec3 color = vWorldY > -1.0 ? vec3(0.4, 0.8, 0.2) : vec3(0.7, 0.6, 0.4);
            float shade = dot(vNormal, vec3(0, 1, 0.5)) > 0.5 ? 1.0 : 0.7;
            gl_FragColor = vec4(color * shade, 1.0);
        }
    `
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
scene.add(terrain);

// --- AGUA ANIMADA ---
const waterMat = new THREE.ShaderMaterial({
    uniforms: { uCurvature: { value: 0.0006 }, uTime: { value: 0 } },
    vertexShader: rollingVS,
    fragmentShader: `
        uniform float uTime;
        varying vec2 vUv;
        void main() {
            float pulse = sin(vUv.y * 50.0 + uTime * 5.0);
            vec3 color = pulse > 0.8 ? vec3(1.0) : vec3(0.1, 0.5, 0.9);
            gl_FragColor = vec4(color, 0.7);
        }
    `,
    transparent: true
});
const water = new THREE.Mesh(new THREE.PlaneGeometry(36, 600), waterMat);
water.rotateX(-Math.PI / 2);
water.position.y = -3;
scene.add(water);

// --- PUENTE DE MADERA ---
const bridge = new THREE.Group();
const woodMat = new THREE.MeshBasicMaterial({ color: 0x5d4037 });
for(let i = -10; i < 10; i++) {
    const plank = new THREE.Mesh(new THREE.BoxGeometry(40, 0.5, 2), woodMat);
    plank.position.z = i * 2.5;
    bridge.add(plank);
}
bridge.position.set(0, -0.5, 0);
scene.add(bridge);

// --- PERSONAJE ---
const player = new THREE.Group();
const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.8, 1.5), new THREE.MeshBasicMaterial({color: 0xffd700}));
player.add(body);
player.position.set(30, 2, 50);
scene.add(player);

// --- FUNCIÓN DE ALTURA DEL SUELO ---
function getY(x, z) {
    if (Math.abs(x) < 18) {
        // Si está en el puente
        if (z > -25 && z < 25) return -0.5; 
        return -4; // Si no, está en el agua
    }
    return Math.sin(x * 0.08) * Math.cos(z * 0.08) * 4;
}

// --- LOOP ---
function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    waterMat.uniforms.uTime.value = clock.elapsedTime;

    const speed = 25 * dt;
    let nextX = player.position.x;
    let nextZ = player.position.z;

    if (keys['w'] || keys['arrowup']) nextZ -= speed;
    if (keys['s'] || keys['arrowdown']) nextZ += speed;
    if (keys['a'] || keys['arrowleft']) nextX -= speed;
    if (keys['d'] || keys['arrowright']) nextX += speed;

    const targetY = getY(nextX, nextZ);
    
    // Solo permitir movimiento si no se cae al agua (o si está en el puente)
    if (targetY > -3.5) {
        player.position.x = nextX;
        player.position.z = nextZ;
        player.position.y = targetY + 1.5;
    }

    camera.position.x += (player.position.x - camera.position.x) * 0.1;
    camera.position.z += (player.position.z + 50 - camera.position.z) * 0.1;
    camera.lookAt(player.position.x, player.position.y, player.position.z - 10);

    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
