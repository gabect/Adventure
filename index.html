<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bosque del Niño con Palo - Versión 8.1 (Fix Azul + Niño Completo)</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; }
  canvas { display:block; }
  #ui {
    position:absolute; top:10px; left:10px; color:#fff; background:rgba(0,0,0,0.7);
    padding:12px 16px; border-radius:8px; pointer-events:none; user-select:none;
    font-size:14px; z-index:10; line-height:1.4;
  }
</style>
</head>
<body>

<div id="ui">
  WASD o flechas • Versión 8.1 Fix Azul<br>
  - Niño completo (animado)<br>
  - Cel-shading y POV rolling<br>
  - Terreno siempre visible<br>
  - Abre console si aún azul
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
// ================================================
// Versión 8.1 - Fix azul + Niño animado
// ================================================

const app = new PIXI.Application({
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: 0x88ccff,
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
  clearBeforeRender: true
});
document.body.appendChild(app.view);

window.addEventListener('resize', () => app.renderer.resize(window.innerWidth, window.innerHeight));

// Jugador
const player = { x: 0, y: 0, speed: 3.2, angle: 0, walkTime: 0, legSwing: 0, armSwing: 0 };

// Controles
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Containers
const terrainContainer = new PIXI.Container();
const objectsContainer = new PIXI.Container();
const playerContainer = new PIXI.Container();
app.stage.addChild(terrainContainer);
app.stage.addChild(objectsContainer);
app.stage.addChild(playerContainer);

// Filtros cel-shading
const outline = new PIXI.filters.OutlineFilter(3, 0x000000, 0.9);
const colorMatrix = new PIXI.filters.ColorMatrixFilter();
colorMatrix.saturate(0.4, false);
app.stage.filters = [outline, colorMatrix];

// Cámara
let camera = { x: 0, y: 0 };

// Dibujar terreno una vez (verde con hierba)
function drawTerrain() {
  terrainContainer.removeChildren();
  const tileSize = 32;
  const numTilesX = Math.ceil(app.screen.width / tileSize) + 10;
  const numTilesY = Math.ceil(app.screen.height / tileSize) + 10;

  for (let tx = -5; tx < numTilesX; tx++) {
    for (let ty = -5; ty < numTilesY; ty++) {
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      const grass = new PIXI.Graphics();
      grass.beginFill(0x7ac142);
      grass.drawRect(wx, wy, tileSize, tileSize);
      grass.endFill();

      grass.lineStyle(1.5, 0x5aa832, 0.7);
      for (let i = 0; i < 5; i++) {
        const ox = wx + Math.random() * tileSize;
        const oy = wy + Math.random() * tileSize;
        grass.moveTo(ox, oy);
        grass.lineTo(ox + (Math.random()-0.5)*4, oy - 10 - Math.random()*8);
      }
      terrainContainer.addChild(grass);
    }
  }
  console.log('Terreno dibujado');
}

// Dibujar objetos (árbol, casa, puente)
function drawObjects() {
  objectsContainer.removeChildren();

  // Árbol
  const tree = new PIXI.Graphics();
  tree.beginFill(0x5a3f2a);
  tree.drawRect(200 - 10, 200 - 10, 20, 50);
  tree.endFill();
  tree.beginFill(0x3a6a3a);
  tree.drawCircle(200, 200 - 40, 30);
  tree.drawCircle(200 - 15, 200 - 55, 25);
  tree.drawCircle(200 + 15, 200 - 50, 28);
  tree.endFill();
  objectsContainer.addChild(tree);

  // Casa
  const house = new PIXI.Graphics();
  house.beginFill(0x8b4513);
  house.drawRect(-200, -100, 60, 40);
  house.endFill();
  house.beginFill(0xa0522d);
  house.moveTo(-230, -100);
  house.lineTo(-200, -160);
  house.lineTo(-140, -100);
  house.endFill();
  house.lineStyle(2, 0x000000, 1);
  house.drawRect(-185, -90, 15, 20); // puerta
  objectsContainer.addChild(house);

  // Puente
  const bridge = new PIXI.Graphics();
  bridge.beginFill(0x8b5a2b);
  bridge.drawRoundedRect(300, 100, 140, 60, 6);
  bridge.endFill();
  bridge.lineStyle(3, 0x5c3f1f, 0.8);
  for (let i = 0; i < 5; i++) {
    bridge.moveTo(300, 100 + i * 12);
    bridge.lineTo(440, 100 + i * 12);
  }
  objectsContainer.addChild(bridge);

  console.log('Objetos dibujados');
}

// Dibujar jugador (niño completo)
let playerGfx = new PIXI.Graphics();
function drawPlayer() {
  playerGfx.clear();

  // Sombras
  playerGfx.beginFill(0x000000, 0.3);
  playerGfx.drawEllipse(player.x, player.y + 20, 12, 6);
  playerGfx.endFill();

  // Piernas
  playerGfx.lineStyle(4, 0x8b4513, 1);
  playerGfx.moveTo(player.x - 5, player.y + 10);
  playerGfx.lineTo(player.x - 5 - player.legSwing * 0.1, player.y + 25);
  playerGfx.moveTo(player.x + 5, player.y + 10);
  playerGfx.lineTo(player.x + 5 + player.legSwing * 0.1, player.y + 25);
  playerGfx.beginFill(0x5a3f2a);
  playerGfx.drawCircle(player.x - 5 - player.legSwing * 0.1, player.y + 25, 4);
  playerGfx.drawCircle(player.x + 5 + player.legSwing * 0.1, player.y + 25, 4);
  playerGfx.endFill();

  // Cuerpo
  playerGfx.beginFill(0xffddaa);
  playerGfx.drawEllipse(player.x, player.y + 5, 12, 18);
  playerGfx.endFill();

  // Brazos
  playerGfx.lineStyle(3, 0xffddaa, 1);
  playerGfx.moveTo(player.x - 10, player.y + 5);
  playerGfx.lineTo(player.x - 15 - player.armSwing * 0.1, player.y + 15);
  playerGfx.moveTo(player.x + 10, player.y + 5);
  playerGfx.lineTo(player.x + 15 + player.armSwing * 0.1, player.y + 15);
  playerGfx.beginFill(0xffddaa);
  playerGfx.drawCircle(player.x - 15 - player.armSwing * 0.1, player.y + 15, 3);
  playerGfx.drawCircle(player.x + 15 + player.armSwing * 0.1, player.y + 15, 3);
  playerGfx.endFill();

  // Cuello
  playerGfx.beginFill(0xffd4aa);
  playerGfx.drawRect(player.x - 3, player.y - 5, 6, 5);
  playerGfx.endFill();

  // Cabeza
  playerGfx.beginFill(0xffd4aa);
  playerGfx.drawCircle(player.x, player.y - 10, 10);
  playerGfx.endFill();

  // Pelo
  playerGfx.lineStyle(2, 0x8b5a2b, 1);
  for (let i = 0; i < 5; i++) {
    const a = i * (Math.PI * 2 / 5) + Math.PI / 2;
    playerGfx.moveTo(player.x + Math.cos(a) * 10, player.y - 10 + Math.sin(a) * 10);
    playerGfx.lineTo(player.x + Math.cos(a) * 15, player.y - 10 + Math.sin(a) * 15);
  }

  // Ojos
  playerGfx.beginFill(0x000000);
  playerGfx.drawCircle(player.x - 4, player.y - 12, 2);
  playerGfx.drawCircle(player.x + 4, player.y - 12, 2);
  playerGfx.endFill();

  // Palo en mano derecha
  playerGfx.lineStyle(5, 0x8b5a2b, 1);
  playerGfx.moveTo(player.x + 15 + player.armSwing * 0.1, player.y + 15);
  playerGfx.lineTo(player.x + 15 + Math.cos(player.angle) * 24, player.y + 15 + Math.sin(player.angle) * 24);
}

// Update
function update(delta) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  if (dx || dy) {
    const len = Math.hypot(dx, dy) || 1;
    dx /= len; dy /= len;
    player.angle = Math.atan2(dy, dx);
    player.walkTime += delta * 0.15;
    player.legSwing = Math.sin(player.walkTime * 8) * 20;
    player.armSwing = Math.cos(player.walkTime * 8) * 15;
  } else {
    player.legSwing = 0;
    player.armSwing = 0;
  }

  player.x += dx * player.speed * delta;
  player.y += dy * player.speed * delta;

  camera.x += (player.x - app.screen.width / 2 - camera.x) * 0.12;
  camera.y += (player.y - app.screen.height / 2 - camera.y) * 0.12;
  world.position.set(-camera.x, -camera.y);

  drawPlayer();
  playerContainer.addChild(playerGfx); // añadir de nuevo cada frame
}

// Ticker
app.ticker.add((delta) => update(delta));

// Inicializar
setTimeout(() => {
  drawTerrain();
  drawObjects();
  drawPlayer();
  playerContainer.addChild(playerGfx);
  console.log('Inicializado - terreno, objetos y jugador añadidos');
}, 0); // fix iOS timing

</script>
</body>
</html>
