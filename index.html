<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gabriel's RPG - Rolling World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; } /* Cielo azul de fondo */
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; font-family: 'Segoe UI', sans-serif; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Prototipo: Colisiones y Horizonte</h2>
        <p>Camina hacia los árboles para probar la colisión.</p>
    </div>

<script>
const app = new PIXI.Application({
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: 0x3a9d23,
    antialias: true
});
document.body.appendChild(app.view);

const world = new PIXI.Container();
app.stage.addChild(world);

// --- CONFIGURACIÓN DE MUNDO ---
const worldSize = 2000;
const trees = [];
const keys = {};

// --- PERSONAJE ---
class Player {
    constructor() {
        this.container = new PIXI.Container();
        this.view = new PIXI.Graphics();
        this.container.addChild(this.view);
        
        this.x = worldSize / 2;
        this.y = worldSize / 2;
        this.radius = 12; // Radio de colisión
        this.speed = 4;
        this.walkTimer = 0;
        
        world.addChild(this.container);
    }

    update(dt) {
        let nextX = this.x;
        let nextY = this.y;
        let moving = false;

        if (keys['w'] || keys['ArrowUp']) { nextY -= this.speed; moving = true; }
        if (keys['s'] || keys['ArrowDown']) { nextY += this.speed; moving = true; }
        if (keys['a'] || keys['ArrowLeft']) { nextX -= this.speed; moving = true; }
        if (keys['d'] || keys['ArrowRight']) { nextX += this.speed; moving = true; }

        // --- SISTEMA DE COLISIONES ---
        // Solo actualizamos posición si no hay choque
        if (!this.checkCollision(nextX, nextY)) {
            this.x = nextX;
            this.y = nextY;
        }

        if (moving) this.walkTimer += 0.2;
        else this.walkTimer *= 0.8;

        this.draw();
        
        // Rolling Log Perspective
        this.container.x = this.x;
        this.container.y = this.y;
        
        // Efecto Animal Crossing: Objetos más pequeños arriba (lejos)
        const relativeY = (this.y - camera.y) / app.screen.height;
        const scale = 0.6 + (relativeY * 0.6); 
        this.container.scale.set(Math.max(0.5, scale));
        
        this.container.zIndex = this.y;
    }

    checkCollision(nx, ny) {
        for (let tree of trees) {
            const dx = nx - tree.x;
            const dy = ny - tree.y; // Colisión en la base del tronco
            const distance = Math.sqrt(dx*dx + dy*dy);
            if (distance < this.radius + 15) return true; // 15 es el grosor del tronco
        }
        return false;
    }

    draw() {
        const g = this.view;
        g.clear();
        const t = this.walkTimer;
        const b = Math.sin(t * 2) * 2;

        // Sombras (Cel-shaded)
        g.beginFill(0x000000, 0.15);
        g.drawEllipse(0, 5, 15, 7);
        g.endFill();

        // Personaje (Simplified Cel-shaded)
        g.lineStyle(3, 0x000000);
        g.beginFill(0xffcc00); // Túnica
        g.drawEllipse(0, -10 + b, 12, 15);
        g.endFill();
        
        g.beginFill(0xffdbac); // Cabeza
        g.drawCircle(0, -32 + b, 10);
        g.endFill();

        // Palo
        g.lineStyle(4, 0x5d4037);
        g.moveTo(10, -10 + b);
        g.lineTo(20, -20 + Math.cos(t)*5);
    }
}

// --- GENERACIÓN DE ÁRBOLES CON HORIZONTE ---
function createTree(x, y) {
    const tree = new PIXI.Container();
    const g = new PIXI.Graphics();
    
    // Tronco
    g.lineStyle(3, 0x000000);
    g.beginFill(0x5d4037);
    g.drawRect(-10, -15, 20, 30);
    g.endFill();

    // Copa
    g.beginFill(0x2d5a27);
    g.drawCircle(0, -35, 25);
    g.drawCircle(-15, -25, 20);
    g.drawCircle(15, -25, 20);
    g.endFill();

    tree.addChild(g);
    tree.x = x;
    tree.y = y;
    tree.zIndex = y;
    world.addChild(tree);
    trees.push(tree);
}

// Llenar el mundo
for(let i=0; i<80; i++) {
    createTree(Math.random() * worldSize, Math.random() * worldSize);
}

const player = new Player();
const camera = { x: 0, y: 0 };

// --- LOOP PRINCIPAL ---
app.ticker.add(() => {
    player.update();

    // Cámara con suavizado
    camera.x += (player.x - app.screen.width/2 - camera.x) * 0.1;
    camera.y += (player.y - app.screen.height/1.5 - camera.y) * 0.05;

    world.x = -camera.x;
    world.y = -camera.y;

    // "Fog" de Horizonte: Desvanecer objetos muy lejanos en Y
    world.children.forEach(child => {
        const screenY = child.y - camera.y;
        if (screenY < 100) { // El "borde" del mundo curvo
            child.alpha = Math.max(0, (screenY) / 100);
        } else {
            child.alpha = 1;
        }
    });

    world.children.sort((a, b) => a.zIndex - b.zIndex);
});

window.onkeydown = e => keys[e.key] = true;
window.onkeyup = e => keys[e.key] = false;
</script>
</body>
</html>
