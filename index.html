<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bosque del Niño con Palo - Versión 7.4 (Comic Style - Optimizado iPad)</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; }
  canvas { display:block; }
  #ui {
    position:absolute; top:10px; left:10px; color:#fff; background:rgba(0,0,0,0.75);
    padding:12px 16px; border-radius:8px; pointer-events:none; user-select:none;
    font-size:14px; z-index:10; line-height:1.4;
  }
</style>
</head>
<body>

<div id="ui">
  WASD o flechas • Versión 7.4 Comic Style (iPad fix)<br>
  - Terreno verde cartoon con hierba dibujada<br>
  - Sombras suaves<br>
  - Puente cruzable cerca<br>
  - Estilo dibujado a mano
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
// ================================================
// Versión 7.4 - Optimizada para iPad + Comic Style
// ================================================

const app = new PIXI.Application({
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: 0x88bbff, // cielo cartoon
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true
});
document.body.appendChild(app.view);

window.addEventListener('resize', () => app.renderer.resize(window.innerWidth, window.innerHeight));

// Jugador
const player = { x: -300, y: -100, size: 18, speed: 3.3, angle: 0, bob: 0 };

// Controles
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Mundo
const world = new PIXI.Container();
app.stage.addChild(world);

// Terreno (un solo Graphics grande - clave para iPad)
const terrain = new PIXI.Graphics();
world.addChild(terrain);

// Cámara
let camera = { x: 0, y: 0 };

// ================================================
// Update
// ================================================
function update(delta) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  if (dx || dy) {
    const len = Math.hypot(dx, dy) || 1;
    dx /= len; dy /= len;
    player.angle = Math.atan2(dy, dx);
    player.bob = Math.sin(Date.now()/120) * 1.5;
  }

  player.x += dx * player.speed * delta;
  player.y += dy * player.speed * delta;

  // Cámara suave
  camera.x += (player.x - app.screen.width/2 - camera.x) * 0.12;
  camera.y += (player.y - app.screen.height/2 - camera.y) * 0.12;
  world.position.set(-camera.x, -camera.y);
}

// ================================================
// Render (una sola vez por frame, muy ligero)
// ================================================
app.ticker.add((delta) => {
  update(delta);

  // Limpiar terreno
  terrain.clear();

  const tileSize = 48;
  const startX = Math.floor(camera.x / tileSize) - 2;
  const endX   = Math.floor((camera.x + app.screen.width) / tileSize) + 3;
  const startY = Math.floor(camera.y / tileSize) - 2;
  const endY   = Math.floor((camera.y + app.screen.height) / tileSize) + 3;

  // Suelo base verde cartoon
  terrain.beginFill(0x6bc14a);
  terrain.drawRect(camera.x - 50, camera.y - 50, app.screen.width + 100, app.screen.height + 100);
  terrain.endFill();

  // Hierba estilo comic (rayitas dibujadas)
  terrain.lineStyle(3, 0x4a9c38, 0.9);
  for (let tx = startX; tx <= endX; tx++) {
    for (let ty = startY; ty <= endY; ty++) {
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      for (let i = 0; i < 6; i++) {
        const ox = wx + 8 + i*6;
        const oy = wy + 30 + Math.random()*12;
        terrain.moveTo(ox, oy);
        terrain.lineTo(ox + (Math.random()-0.5)*5, oy - 18 - Math.random()*10);
      }
    }
  }

  // Puente (cerca del spawn para que lo veas rápido)
  const bridge = new PIXI.Graphics();
  bridge.beginFill(0x8b5a2b);
  bridge.drawRoundedRect(400, 300, 180, 70, 12);
  bridge.endFill();
  bridge.lineStyle(6, 0x5c3f1f);
  bridge.drawRoundedRect(400, 300, 180, 70, 12);
  world.addChild(bridge);

  // Árbol cartoon grande cerca
  const tree = new PIXI.Graphics();
  tree.beginFill(0x4a2f1a);
  tree.drawRect(-800, -400, 32, 90);
  tree.endFill();
  tree.beginFill(0x2e6a2e);
  tree.drawEllipse(-784, -380, 55, 45);
  tree.drawEllipse(-820, -430, 42, 38);
  tree.drawEllipse(-750, -410, 48, 40);
  tree.endFill();
  world.addChild(tree);

  // Jugador con sombra y bob
  const shadow = new PIXI.Graphics();
  shadow.beginFill(0x000000, 0.35);
  shadow.drawEllipse(player.x + 4, player.y + 22, player.size * 1.1, 8);
  shadow.endFill();
  world.addChild(shadow);

  const playerGfx = new PIXI.Graphics();
  playerGfx.beginFill(0xffe0b0);
  playerGfx.drawEllipse(player.x, player.y + player.bob, player.size, player.size * 0.95);
  playerGfx.endFill();
  playerGfx.lineStyle(3, 0x000000);
  playerGfx.drawEllipse(player.x, player.y + player.bob, player.size, player.size * 0.95); // borde comic
  world.addChild(playerGfx);

  // Palo
  const stick = new PIXI.Graphics();
  stick.lineStyle(7, 0x8b5a2b);
  stick.moveTo(player.x, player.y + player.bob);
  stick.lineTo(player.x + Math.cos(player.angle)*32, player.y + player.bob + Math.sin(player.angle)*32);
  world.addChild(stick);
});
</script>
</body>
</html>
